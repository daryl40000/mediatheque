; Limites PHP pour les envois de fichiers (PDF magazines, etc.)
; Pris en compte par PHP-FPM / Apache avec mod_php si AllowOverride inclut PHPIniDir.
; Serveur intégré PHP : utiliser www/serve.sh à la place.
upload_max_filesize = 350M
post_max_size = 360M
max_execution_time = 900
max_input_time = 900
