# CI — tests PHPUnit automatiques
#
# Lance la suite de tests à chaque push et pull request sur les branches principales.
# Objectif : détecter les régressions avant merge (filet de sécurité).

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, sqlite3, dom, xml, ctype, tokenizer
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=512M
      - uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit unit
        run: ./vendor/bin/phpunit --testsuite unit

  integration:
    name: Integration (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, sqlite3, dom, xml, ctype, tokenizer
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=512M
      - uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit integration
        run: ./vendor/bin/phpunit --testsuite integration
        env:
          COMPOSER_PROCESS_TIMEOUT: 0

  coverage:
    name: Coverage baseline (PHP 8.3)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3, dom, xml, ctype, tokenizer
          coverage: pcov
          tools: composer:v2
          ini-values: memory_limit=512M
      - uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php8.3-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php8.3-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit coverage (text)
        run: ./vendor/bin/phpunit --coverage-text --colors=never | tee coverage-baseline.txt
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-baseline
          path: coverage-baseline.txt
          retention-days: 30
